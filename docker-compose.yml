version: "3.9"

services:
  db:
    image: mysql:8
    container_name: character_db
    environment:
      MYSQL_ROOT_PASSWORD: "ON_thisDay13@"
      MYSQL_DATABASE: "character_prediction_model"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  
  app:
    build:
    container_name: character_api
    depends_on:
      -db
    environment:
      DATABASE_URL: "mysql+aiomysql://root:ON_thisDay13%40@db/character_prediction_model"
    ports:
      - "8000:8000"
    volumes: 
      - .:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000

volumes:
  db_data: