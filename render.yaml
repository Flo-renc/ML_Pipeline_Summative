# render.yaml
services:
  - type: web
    name: ml-pipeline-summative
    env: python
    region: oregon   # or your preferred region
    plan: free       # or paid
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11.9
    